services:
  app:
    build:
      context: .
      target: frankenphp_prod
    container_name: petroslabs_app
    restart: unless-stopped
    networks:
      - symfony_env
    labels:
      - "traefik.enable=true"
      # HTTP → HTTPS
      - "traefik.http.routers.petroslabs-http.entrypoints=http"
      - "traefik.http.routers.petroslabs-http.rule=Host(`${APP_DOMAIN:-petroslabs.localhost}`)"
      - "traefik.http.routers.petroslabs-http.middlewares=https-redirect"
      # HTTPS
      - "traefik.http.routers.petroslabs.entrypoints=https"
      - "traefik.http.routers.petroslabs.rule=Host(`${APP_DOMAIN:-petroslabs.localhost}`)"
      - "traefik.http.routers.petroslabs.tls=true"
      - "traefik.http.routers.petroslabs.tls.certresolver=letsencrypt"
      - "traefik.http.services.petroslabs.loadbalancer.server.port=80"

networks:
  symfony_env:
    external: true
